name: Clipse
options:
  bundleIdPrefix: com.clipse
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Clipse:
    type: application
    platform: macOS
    sources:
      - path: Clipse
    info:
      path: Clipse/Resources/Info.plist
      properties:
        CFBundleName: Clipse
        CFBundleDisplayName: Clipse
        CFBundleIdentifier: com.clipse.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: "© 2025 Clipse"
    entitlements:
      path: Clipse/Resources/Clipse.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipse.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
